name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: nano-vllm-gpu
    container:
      image: python:3.12-slim
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - run: pip install --no-cache-dir ruff
      - run: ruff check --select E9,F63,F7,F82 .

  example:
    needs: lint
    runs-on: nano-vllm-gpu
    container:
      image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-runtime
      options: --gpus all
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - run: nvidia-smi
      - name: Install C compiler for Triton JIT
        run: apt-get update && apt-get install -y --no-install-recommends gcc g++
      - run: pip install --no-cache-dir --extra-index-url https://pypi.nvidia.com -e . huggingface_hub
      - name: Download Qwen3-0.6B to path expected by example.py
        run: |
          mkdir -p ~/huggingface
          hf download Qwen/Qwen3-0.6B --local-dir ~/huggingface/Qwen3-0.6B/
      - run: python example.py

  bench:
    needs: example
    runs-on: nano-vllm-gpu
    container:
      image: pytorch/pytorch:2.8.0-cuda12.8-cudnn9-runtime
      options: --gpus all
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: nvidia-smi
      - name: Install C compiler for Triton JIT
        run: apt-get update && apt-get install -y --no-install-recommends gcc g++
      - run: pip install --no-cache-dir --extra-index-url https://pypi.nvidia.com -e . huggingface_hub
      - run: |
          mkdir -p ~/huggingface
          hf download Qwen/Qwen3-0.6B --local-dir ~/huggingface/Qwen3-0.6B/
      - run: python bench.py
